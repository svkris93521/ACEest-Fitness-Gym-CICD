# Metadata
sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=1.0

# Path to source directories (required)
sonar.sources=.

# Path to test directories
sonar.tests=tests/

# Excluding files from analysis
sonar.exclusions=venv/**, tests/**, **/*.xml

# Language specific rules
sonar.language=py

# Path to unit test execution reports
sonar.python.xunit.reportPath=reports/test-report.xml
