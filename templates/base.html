<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEest Fitness & Performance</title>
    <!-- Add Bootstrap for quick UI structuring matching Tkinter -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #d4af37 !important;
        }
        .navbar-brand {
            font-weight: bold;
            color: black !important;
        }
        .card {
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }
        .text-gold {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">ACEest Fitness Dashboard</a>
            {% if session.get('current_user') %}
            <div class="d-flex">
                <span class="navbar-text text-dark me-3 fw-bold">User: {{ session['current_user'] }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-dark btn-sm">Logout</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-success alert-dismissible fade show fw-bold text-center border-2 border-success" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
